<!DOCTYPE html>
<!--  /src/main/webapp/ex02_selector1.html -->
<html>
<head>
<meta charset="UTF-8">
<title>선택자1</title>
</head>
<body>
<h3>아이디 선택자</h3>
<h1 id="id1">테스트1</h1>
<h1 id="id2">테스트2</h1>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script type="text/javascript">
	$(function(){
	//id="id1"인 태그의 글자색을 빨강, 내용 h1변경 으로 내용 변경
		document.querySelector("#id1").style.color="red";
		document.querySelector("#id1").innerHTML="h1변경";
	//id="id2"인 태그의 글자색을 빨강, 내용 h1변경 으로 내용 변경 => jQuery 이용
		$("#id2").css("color","red");
		$("#id2").html("h1변경")
		console.log(document.querySelector("#id1"));
		console.log(document.getElementById("id1"));
		console.log($("#id2"));
	})
</script>
<h3>태그 선택자</h3>
<p>Java</p><p>MariaDB</p><p>HTML</p>
<h5>CSS</h5><h5>JavaScript</h5><h5>JQuery</h5>
<script type="text/javascript">
	$(function(){
		//p태그의 글자색을 pink로 변경
		const parr = document.getElementsByTagName("p");
		for(let i=0;i<parr.length;i++) {
			parr[i].style.color="pink"
		}
		//jquery 방식으로 h5태그의 글자색을 파란색으로 변경
		$("h5").css("color","blue")
		//jquery를 이용하여, p,h5,#id1태그의 배경색을 yellow로 변경하기
		$("p,h5,#id1").css("backgroundColor","yellow")
	})
</script>
<hr>
<h3>클래스 선택자</h3>
<h1 class="item">Class 1</h1>
<h1 class="item select">Class 2</h1>
<h1 class="item select">Class 3</h1>
<script type="text/javascript">
	$(function(){
		const itemarr = document.getElementsByClassName("item"); //class="item"인 태그들 배열로 리턴
		for(let i=0;i<itemarr.length;i++) {
			itemarr[i].style.color = "orange";
			itemarr[i].onclick=function(){
				console.log("클릭됨")
			}
		}
		
		//jquery방식으로 select 클래스속성값의 태그를 배경색을 pink로 변경. 클릭됨이 출력되도록 이벤트 등록하기
		$(".select").css("backgroundColor","pink");
		$(".select").click(function() {
			console.log("클릭됨-select")
		})
	})
</script>
</body>
</html>
