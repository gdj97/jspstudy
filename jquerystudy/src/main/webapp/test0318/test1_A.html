<!DOCTYPE html>
<!-- /webapp/test0318/test1.html
   test1.html: ajax 통해 test1.jsp의 숫자 중 가장 큰값을 찾아 result 영역에 출력하기 
   test1.jsp : 0~99사이의 임의의 값을 10 개 생성하여 ,로 연결하여 전송하기
-->
<html>
<head>
<meta charset="UTF-8">
<title>ajax Test</title>
</head>
<body>
<button id="btn1">XMLHttpRequest 객체</button>
<button id="btn2">fetch 함수</button>
<button id="btn3">jQuery</button>
<div id="result"></div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script type="text/javascript">
const xhttp = new XMLHttpRequest()

$("#btn1").click(function() { 
	xhttp.open("GET","test1.jsp")
	xhttp.send()
	xhttp.onreadystatechange=callBack
})

$("#btn2").click(function() {
    fetch("test1.jsp")
 .then ((r) => r.text()) //r.text() : 응답메세지
 .then((data)=> {        //data : 응답메세지. 서버가 전달한 데이터
	  const nums = data.split(",")  
	  let max = parseInt(nums[0].trim())
	  let min = parseInt(nums[0].trim())
	  for(let i=1;i < nums.length;i++) {
		  nums[i] = parseInt(nums[i].trim())
		  if(max < nums[i]) max = nums[i]
		  if(min > nums[i]) min = nums[i]
	  }
	  document.querySelector("#result").innerHTML = 
	  "<strong> ["+data  +"]중 최대값:"+max+"<br>["
   + data  +"]중 최소값:"+min+"</strong>";	 
 });
})
$("#btn3").click(function() {
	$.ajax("test1.jsp",{
		success: function(data) {
			  const nums = data.split(",")
			  let max = parseInt(nums[0].trim())
			  let min = parseInt(nums[0].trim())
			  for(let i=1;i < nums.length;i++) {
				  nums[i] = parseInt(nums[i].trim())
				  if(max < nums[i]) max = nums[i]
				  if(min > nums[i]) min = nums[i]
			  }
			  $("#result").html(`<strong> [${data}]중 최대값:${max}<br>[${data}]중 최소값:${min}</strong>`); 
		},
		error : function(e){
			alert("서버오류:" + e.status);
		}
	})	
})

function callBack() {
	  if(xhttp.readyState == 4 && xhttp.status == 200) {
		  const nums = xhttp.responseText.split(",") //배열
		  let max = parseInt(nums[0].trim()) //최대값 초기화. 배열의 첫번째 데이터
		  let min = parseInt(nums[0].trim()) //최소값 초기화. 배열의 첫번째 데이터
		  for(let i=1;i < nums.length;i++) {
			  nums[i] = parseInt(nums[i].trim())
			  if(max < nums[i]) max = nums[i]
			  if(min > nums[i]) min = nums[i]
		  }
		  //xhttp.responseText : 서버의 응답 데이터. 
		  document.querySelector("#result").innerHTML = 
	  "<strong> ["+xhttp.responseText  +"]중 최대값:"+max+"<br>["
	   + xhttp.responseText  +"]중 최소값:"+min+"</strong>"
	  }
}
</script>

</body></html>
