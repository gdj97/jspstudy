<!DOCTYPE html>
<!-- /webapp/test0318/test2.html
   test2.jsp 에서 num에서 입력 받은 숫자까지의 합계를 구하기
-->
<html>
<head>
<meta charset="UTF-8">
<title>fetch Test</title>
</head>
<body>
<h3>1. XMLHttpRequest 객체를 통해 현재 페이지에 전송받아 결과를 result1 영역에 출력하기</h3>
숫자 : <input type="text" id="num1"><br>
<button onclick="ajaxtest(0)">전체합계구하기</button> 
<button onclick="ajaxtest(1)">짝수합구하기</button> 
<button onclick="ajaxtest(2)">홀수합구하기</button> 
<div id="result1"></div>
<script type="text/javascript">
const xhttp = new XMLHttpRequest()
function ajaxtest(kbn) {
	xhttp.open("POST","test2.jsp")
	xhttp.setRequestHeader("Content-type","application/x-www-form-urlencoded;charset=UTF-8");
	xhttp.send("num="+document.querySelector("#num1").value+"&kbn="+kbn) //POST방식에서 파라미터값 전달
	xhttp.onreadystatechange=function() {
	  if(xhttp.readyState == 4 && xhttp.status == 200) {
		document.querySelector("#result1").innerHTML=xhttp.responseText;
	  }
	}
}
</script>

<hr>
<h3>2. fetch을 통해 현재 페이지에 전송받아 결과를 result2 영역에 출력하기</h3>
숫자 : <input type="text" id="num2"><br>
<button onclick="fetchtest(0)">전체합계구하기</button> 
<button onclick="fetchtest(1)">짝수합구하기</button> 
<button onclick="fetchtest(2)">홀수합구하기</button> 
<div id="result2"></div>
<script type="text/javascript">
function fetchtest(kbn) {
    fetch("test2.jsp",{
		   method : "POST",
		   headers : {"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"},
		   body:"num="+document.querySelector("#num2").value+"&kbn="+kbn   //파라미터설정
	     })
    .then ((r) => r.text())
    .then((data)=> document.querySelector("#result2").innerHTML=data);
}

</script>
<hr>
<h3>3.jQuery을 통해 현재 페이지에 전송받아 결과를 result3 영역에 출력하기</h3>
숫자 : <input type="text" id="num3"><br>
<button onclick="jquerytest(0)">전체합계구하기</button> 
<button onclick="jquerytest(1)">짝수합구하기</button> 
<button onclick="jquerytest(2)">홀수합구하기</button> 
<div id="result3"></div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script type="text/javascript">
function jquerytest(kbn) {
    $.ajax({
    	url :  "test2.jsp",
		type : "POST",
		data:"num="+$("#num3").val()+"&kbn="+kbn,
		success : function(data) {
			$("#result3").html(data);
		},
		error : function(e) {
			alert("서버오류 :" + e.status);
		}
    })
}
</script>
</body></html>
